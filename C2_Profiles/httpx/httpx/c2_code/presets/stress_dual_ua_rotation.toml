name = "Stress Dual UA Rotation"

[get]
verb = "GET"
uris = ["/api/v2/poll", "/api/v2/ping", "/edge/status"]

[get.client.headers]
Accept = "application/json, text/plain, */*"
Accept-Encoding = "gzip, deflate"
Cache-Control = "no-cache"
Pragma = "no-cache"
User-Agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
X-Client = "sync"

[get.client.domain_specific_headers."https://edge-a.example.test:443"]
User-Agent = "Microsoft-Delivery-Optimization/10.0"
X-Edge = "A"

[get.client.domain_specific_headers."https://edge-b.example.test:443"]
User-Agent = "Microsoft BITS/7.8"
X-Edge = "B"

[get.client.parameters]
build = "24H2 26100"
feature = "query encoding"
ring = "alpha/beta"

[get.client.message]
location = "query"
name = "q"

[[get.client.transforms]]
action = "base64url"

[get.server.headers]
Cache-Control = "no-store"
Content-Type = "application/json; charset=utf-8"
Server = "edge-cache"

[[get.server.transforms]]
action = "base64url"

[[get.server.transforms]]
action = "prepend"
value = "{\"cursor\":\""

[[get.server.transforms]]
action = "append"
value = "\",\"ok\":true}"

[post]
verb = "POST"
uris = ["/api/v2/upload", "/telemetry/submit"]

[post.client.headers]
Accept = "*/*"
Connection = "Keep-Alive"
Content-Type = "application/octet-stream"
Pragma = "no-cache"
User-Agent = "Microsoft-Delivery-Optimization/10.0"
X-Upload-Mode = "bulk"

[post.client.parameters]
shard = "2"
stream = "foreground"

[post.client.message]
location = "body"

[[post.client.transforms]]
action = "xor"
value = "do-proxy-key"

[[post.client.transforms]]
action = "base64url"

[post.server.headers]
Cache-Control = "no-cache"
Content-Type = "application/octet-stream"
Server = "edge-cache"

[[post.server.transforms]]
action = "xor"
value = "do-proxy-key"

[[post.server.transforms]]
action = "base64url"
